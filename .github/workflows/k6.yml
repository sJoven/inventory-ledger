name: k6 Performance Tests

on:
  workflow_dispatch:

jobs:
  k6-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Run Read-Heavy Test
        run: |
          k6 run tests/performance/product-search-load-test.js

      - name: Run Create Product Stress Test
        run: |
          k6 run tests/performance/product-create-stress-test.js
